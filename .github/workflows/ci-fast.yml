name: CI Fast

# Chequeo rápido para iterar sin gastar minutos: typecheck + tests unitarios de
# packages/core y provider-local. Nada de Docker/Supabase/Playwright aquí — eso
# vive en CI Full (obligatorio antes de mergear a main).
on:
  push:
    branches-ignore: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Typecheck (workspaces)
        run: npm run typecheck

      - name: Typecheck (apps/web)
        run: cd apps/web && bunx tsc --noEmit

      - name: Tests unitarios (core + provider-local)
        run: npm run test -w @tecnofal/core && npm run test -w @tecnofal/provider-local
