name: CI Full

# Suite completa: typecheck, tests unitarios y e2e del panel web (Playwright,
# en serie) contra un Supabase local real levantado en el runner. Es el check
# requerido para mergear a main (branch protection).
#
# El e2e propio de apps/extension (Fase 1, ya en producción) queda FUERA del
# gate a propósito (decisión del usuario, 2026-07-12): falla en el Chromium
# headless de este runner — probablemente el modo headless clásico no soporta
# bien extensiones cargadas (necesitaría --headless=new o xvfb). Es un
# problema preexistente sin relación con el panel web; queda pendiente como
# mejora aparte, sin bloquear el deploy.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    runs-on: ubuntu-latest
    env:
      # ÚNICA fuente de la versión del CLI de Supabase. Cambiar SOLO aquí:
      # el setup-cli, la key de la caché de imágenes y el `npx supabase@…` de
      # abajo la derivan de esta var, así no se pueden desincronizar al bumpear.
      SUPABASE_CLI_VERSION: "2.109.1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Typecheck (workspaces)
        run: npm run typecheck

      - name: Typecheck (apps/web)
        run: cd apps/web && bunx tsc --noEmit

      - name: Build (core + extensión)
        run: npm run build

      - name: Cache navegadores de Playwright
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Instalar navegadores de Playwright
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
      - name: Instalar solo dependencias del sistema (caché de navegadores ya presente)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Tests unitarios (core + provider-local)
        run: npm run test -w @tecnofal/core && npm run test -w @tecnofal/provider-local

      - uses: supabase/setup-cli@v1
        with: { version: "${{ env.SUPABASE_CLI_VERSION }}" }

      # El costo de `supabase start` es casi todo pull de imágenes Docker (la de
      # supabase/postgres sola pesa ~340 MB) — el runner no las persiste entre
      # corridas, así que las baja enteras cada vez. Las cacheamos con save/load:
      # en cache-hit `supabase start` no re-baja nada y colapsa a boot+migraciones.
      # La key va atada a la versión FIJA del CLI de arriba (los tags de imagen los
      # fija esa versión); al subir el pin, cambia la key y se hace un pull limpio.
      - name: Restaurar caché de imágenes Docker de Supabase
        id: cache-imgs
        uses: actions/cache@v4
        with:
          path: ~/supabase-images.tar
          key: supabase-imgs-${{ env.SUPABASE_CLI_VERSION }}

      - name: Cargar imágenes cacheadas
        if: steps.cache-imgs.outputs.cache-hit == 'true'
        run: docker load -i ~/supabase-images.tar

      # 0025_ram_ssd_soldada_deduccion.sql es una migración NO autorizada, de
      # origen incierto, que el usuario decidió explícitamente dejar sin aplicar
      # en producción (2026-07-11) — se excluye también aquí para que el schema
      # de CI coincida con el real. El archivo NO se toca en el repo, solo se
      # mueve fuera de supabase/migrations/ en este runner efímero.
      - name: Excluir migración no autorizada 0025 (solo en este runner)
        run: |
          mkdir -p /tmp/excluded-migrations
          mv supabase/migrations/0025_ram_ssd_soldada_deduccion.sql /tmp/excluded-migrations/ 2>/dev/null || true

      # Solo levantamos los servicios que la suite e2e realmente usa: db (Postgres),
      # auth (GoTrue: createUser/listUsers/login) y rest (PostgREST: supabase-js).
      # realtime se deja por la dependencia de WebSocket de supabase-js (ver CLAUDE.md).
      # Excluimos el resto (studio, edge-runtime, imgproxy, storage-api, logflare,
      # vector, supavisor, postgres-meta, mailpit) — ninguna spec los toca: no hay
      # subida de fotos/Storage en e2e y asegurarBucketFotos/subirFoto solo corren en
      # handlers de acción del usuario, no en render. Menos contenedores que bajar y
      # bootear ⇒ menos tiempo de arranque, sin perder el aislamiento por corrida.
      - name: Levantar Supabase local (solo db + auth + rest + realtime)
        run: |
          inicio=$(date +%s)
          npx supabase@${SUPABASE_CLI_VERSION} start -x studio,edge-runtime,imgproxy,storage-api,logflare,vector,supavisor,postgres-meta,mailpit
          echo "⏱️ supabase start tardó $(( $(date +%s) - inicio ))s"

      # Solo la primera vez (cache-miss): guardamos las imágenes que el start dejó
      # bajadas para que actions/cache las suba. Filtramos a las de supabase/kong/
      # postgrest para no arrastrar las imágenes preinstaladas del runner.
      - name: Guardar imágenes de Supabase en caché
        if: steps.cache-imgs.outputs.cache-hit != 'true'
        run: |
          imgs=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -Ei 'supabase|postgrest|kong' | grep -v '<none>')
          echo "$imgs"
          docker save -o ~/supabase-images.tar $imgs

      - name: Configurar apps/web/.env.local
        run: cp apps/web/.env.local.example apps/web/.env.local

      - name: Suite Playwright completa (apps/web, en serie)
        run: cd apps/web && bunx playwright test --workers=1

      - name: Subir reporte de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
