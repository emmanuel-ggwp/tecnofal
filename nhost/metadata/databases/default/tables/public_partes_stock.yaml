table:
  name: partes_stock
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - parte_id
        - cantidad
        - costo_promedio
select_permissions:
  - role: user
    permission:
      columns:
        - parte_id
        - user_id
        - cantidad
        - costo_promedio
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - parte_id
        - cantidad
        - costo_promedio
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
