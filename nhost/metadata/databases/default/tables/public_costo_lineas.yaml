table:
  name: costo_lineas
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - ambito
        - ambito_id
        - tipo
        - monto_estimado
        - estimado_congelado_at
        - monto_real
        - fecha_real
        - moneda
        - movimiento_id
        - descripcion
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - ambito
        - ambito_id
        - tipo
        - monto_estimado
        - estimado_congelado_at
        - monto_real
        - fecha_real
        - moneda
        - movimiento_id
        - descripcion
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - ambito
        - ambito_id
        - tipo
        - monto_estimado
        - estimado_congelado_at
        - monto_real
        - fecha_real
        - moneda
        - movimiento_id
        - descripcion
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
