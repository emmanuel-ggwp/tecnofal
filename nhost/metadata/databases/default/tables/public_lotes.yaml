table:
  name: lotes
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - fecha_compra
        - origen
        - url_ebay
        - vendedor
        - precio_subasta
        - envio_usa
        - costo_proyectado_total
        - metodo_estimado
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - fecha_compra
        - origen
        - url_ebay
        - vendedor
        - precio_subasta
        - envio_usa
        - costo_proyectado_total
        - metodo_estimado
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - fecha_compra
        - origen
        - url_ebay
        - vendedor
        - precio_subasta
        - envio_usa
        - costo_proyectado_total
        - metodo_estimado
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
