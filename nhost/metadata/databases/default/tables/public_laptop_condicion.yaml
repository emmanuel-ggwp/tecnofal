table:
  name: laptop_condicion
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - laptop_id
        - bateria_horas
        - pantalla
        - puertos_malos
        - teclado
        - touchpad
        - bisagras
        - carcasa
        - audio
        - notas
select_permissions:
  - role: user
    permission:
      columns:
        - laptop_id
        - user_id
        - bateria_horas
        - pantalla
        - puertos_malos
        - teclado
        - touchpad
        - bisagras
        - carcasa
        - audio
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - laptop_id
        - bateria_horas
        - pantalla
        - puertos_malos
        - teclado
        - touchpad
        - bisagras
        - carcasa
        - audio
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
