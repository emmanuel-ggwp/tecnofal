table:
  name: partes_especificas
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - parte_id
        - identificador
        - costo_real
        - laptop_asignada_id
        - origen
        - cosechada_de_laptop_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - parte_id
        - identificador
        - costo_real
        - laptop_asignada_id
        - origen
        - cosechada_de_laptop_id
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - parte_id
        - identificador
        - costo_real
        - laptop_asignada_id
        - origen
        - cosechada_de_laptop_id
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
