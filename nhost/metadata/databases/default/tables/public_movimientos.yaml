table:
  name: movimientos
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - cuenta_id
        - fecha
        - tipo
        - monto
        - categoria
        - concepto
        - venta_id
        - lote_id
        - costo_linea_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - cuenta_id
        - fecha
        - tipo
        - monto
        - categoria
        - concepto
        - venta_id
        - lote_id
        - costo_linea_id
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - cuenta_id
        - fecha
        - tipo
        - monto
        - categoria
        - concepto
        - venta_id
        - lote_id
        - costo_linea_id
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
