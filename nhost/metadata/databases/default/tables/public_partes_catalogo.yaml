table:
  name: partes_catalogo
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - nombre
        - precio_referencia
        - valor_nominal
        - volumen_pie3
        - peso_kg
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - nombre
        - precio_referencia
        - valor_nominal
        - volumen_pie3
        - peso_kg
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - nombre
        - precio_referencia
        - valor_nominal
        - volumen_pie3
        - peso_kg
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
