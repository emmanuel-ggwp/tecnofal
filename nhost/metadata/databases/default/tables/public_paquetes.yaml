table:
  name: paquetes
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - courier
        - guia
        - metodo
        - estado
        - volumen_estimado_pie3
        - peso_estimado_kg
        - flete_estimado
        - seguro_estimado
        - revision_estimada
        - fecha_recibido
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - courier
        - guia
        - metodo
        - estado
        - volumen_estimado_pie3
        - peso_estimado_kg
        - flete_estimado
        - seguro_estimado
        - revision_estimada
        - fecha_recibido
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - courier
        - guia
        - metodo
        - estado
        - volumen_estimado_pie3
        - peso_estimado_kg
        - flete_estimado
        - seguro_estimado
        - revision_estimada
        - fecha_recibido
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
