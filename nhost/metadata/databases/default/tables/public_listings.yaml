table:
  name: listings
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - ebay_item_id
        - url
        - titulo
        - precio_visto
        - fecha_visto
        - semaforo
        - specs_parseadas
        - precio_max_puja
        - precio_puja_decente
        - evaluacion_manual
        - estado
        - lote_id
        - cantidad_laptops
        - costo_estimado_total
        - valor_esperado_total
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - ebay_item_id
        - url
        - titulo
        - precio_visto
        - fecha_visto
        - semaforo
        - specs_parseadas
        - precio_max_puja
        - precio_puja_decente
        - evaluacion_manual
        - estado
        - lote_id
        - cantidad_laptops
        - costo_estimado_total
        - valor_esperado_total
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - ebay_item_id
        - url
        - titulo
        - precio_visto
        - fecha_visto
        - semaforo
        - specs_parseadas
        - precio_max_puja
        - precio_puja_decente
        - evaluacion_manual
        - estado
        - lote_id
        - cantidad_laptops
        - costo_estimado_total
        - valor_esperado_total
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
