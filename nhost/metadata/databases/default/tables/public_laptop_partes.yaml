table:
  name: laptop_partes
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - laptop_id
        - parte_id
        - parte_especifica_id
        - costo_aplicado
        - fecha
