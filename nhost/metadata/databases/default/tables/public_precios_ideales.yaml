table:
  name: precios_ideales
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - cpu_tipo
        - gen_desde
        - gen_hasta
        - precio_base
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - cpu_tipo
        - gen_desde
        - gen_hasta
        - precio_base
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - cpu_tipo
        - gen_desde
        - gen_hasta
        - precio_base
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
