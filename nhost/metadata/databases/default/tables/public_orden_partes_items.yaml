table:
  name: orden_partes_items
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - orden_id
        - parte_id
        - cantidad
        - precio_unitario
        - prorrateo
        - prorrateo_manual
        - recibido
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - orden_id
        - parte_id
        - cantidad
        - precio_unitario
        - prorrateo
        - prorrateo_manual
        - recibido
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - orden_id
        - parte_id
        - cantidad
        - precio_unitario
        - prorrateo
        - prorrateo_manual
        - recibido
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
