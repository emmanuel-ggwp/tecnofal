table:
  name: paquete_items
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - paquete_id
        - tipo
        - ref_id
        - descripcion
        - volumen_pie3
        - valor_declarado
        - flete_prorrateado
        - seguro_prorrateado
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - paquete_id
        - tipo
        - ref_id
        - descripcion
        - volumen_pie3
        - valor_declarado
        - flete_prorrateado
        - seguro_prorrateado
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - paquete_id
        - tipo
        - ref_id
        - descripcion
        - volumen_pie3
        - valor_declarado
        - flete_prorrateado
        - seguro_prorrateado
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
