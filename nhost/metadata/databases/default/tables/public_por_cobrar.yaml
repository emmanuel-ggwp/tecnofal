table:
  name: por_cobrar
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - persona
        - monto
        - moneda
        - fecha
        - estado
        - abonado
        - notas
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - persona
        - monto
        - moneda
        - fecha
        - estado
        - abonado
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - persona
        - monto
        - moneda
        - fecha
        - estado
        - abonado
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
