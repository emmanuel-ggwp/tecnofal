table:
  name: laptop_detalles
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - laptop_id
        - detalle_id
        - deduccion_aplicada
        - notas
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - laptop_id
        - detalle_id
        - deduccion_aplicada
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - laptop_id
        - detalle_id
        - deduccion_aplicada
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
