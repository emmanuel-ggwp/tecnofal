table:
  name: ventas
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - laptop_id
        - comprador_id
        - fecha
        - precio_venta
        - moneda
        - monto_ves
        - tasa_implicita
        - estado
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - laptop_id
        - comprador_id
        - fecha
        - precio_venta
        - moneda
        - monto_ves
        - tasa_implicita
        - estado
        - garantia_hasta
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - laptop_id
        - comprador_id
        - fecha
        - precio_venta
        - moneda
        - monto_ves
        - tasa_implicita
        - estado
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
