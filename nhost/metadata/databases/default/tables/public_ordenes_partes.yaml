table:
  name: ordenes_partes
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - fecha
        - origen
        - fuente
        - envio_usa
        - fees
        - notas
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - fecha
        - origen
        - fuente
        - envio_usa
        - fees
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - fecha
        - origen
        - fuente
        - envio_usa
        - fees
        - notas
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
