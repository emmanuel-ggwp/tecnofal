table:
  name: conversiones
  schema: public
insert_permissions:
  - role: user
    permission:
      check: 
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - fecha
        - movimiento_origen_id
        - movimiento_destino_id
        - monto_origen
        - monto_destino
        - nota
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - fecha
        - movimiento_origen_id
        - movimiento_destino_id
        - monto_origen
        - monto_destino
        - nota
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - id
        - fecha
        - movimiento_origen_id
        - movimiento_destino_id
        - monto_origen
        - monto_destino
        - nota
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
      check: 
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter: 
        user_id:
          _eq: X-Hasura-User-Id
